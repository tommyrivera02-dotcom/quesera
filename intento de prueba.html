<script>
function recalcularPedido() {
    let totalAcumulado = 0;
    const todosLosProductos = document.querySelectorAll('.producto');

    todosLosProductos.forEach(checkbox => {
        const contenedorPadre = checkbox.closest('label');
        const inputCantidad = contenedorPadre.querySelector('.cantidad-input');

        if (checkbox.checked) {
            inputCantidad.style.display = 'block';
            const precio = parseInt(checkbox.getAttribute('data-precio'));
            const cantidad = parseInt(inputCantidad.value) || 1;
            totalAcumulado += (precio * cantidad);
        } else {
            inputCantidad.style.display = 'none';
            inputCantidad.value = 1;
        }
    });

    document.getElementById('precio-total').innerText = 'Total: $' + totalAcumulado.toLocaleString('es-CO');
}

document.addEventListener('DOMContentLoaded', () => {
    const checkboxes = document.querySelectorAll('.producto');
    const inputsCantidad = document.querySelectorAll('.cantidad-input');

    checkboxes.forEach(cb => cb.addEventListener('change', recalcularPedido));
    inputsCantidad.forEach(input => input.addEventListener('input', recalcularPedido));
});

function generarPedido() {
    const seleccionados = document.querySelectorAll('.producto:checked');

    if (seleccionados.length === 0) {
        alert("Por favor, selecciona al menos un producto.");
        return;
    }

    let mensaje = "Hola! Quisiera realizar el siguiente pedido en Oh! Queserá:%0A%0A";
    let totalFinal = 0;

    seleccionados.forEach(cb => {
        const inputCant = cb.closest('label').querySelector('.cantidad-input');
        const cantidad = inputCant.value;
        const subtotal = parseInt(cb.getAttribute('data-precio')) * parseInt(cantidad);
        mensaje += `- ${cantidad}x ${cb.getAttribute('data-nombre')} ($${subtotal.toLocaleString('es-CO')})%0A`;
        totalFinal += subtotal;
    });

    mensaje += "%0A*Total del pedido: $" + totalFinal.toLocaleString('es-CO') + "*";
    window.location.href = "https://wa.me/573134004098?text=" + mensaje;
}
</script>
